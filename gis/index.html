<!DOCTYPE html>
<html>
<head>
  <title>Lost & Found GIS Map with Hotspot</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #map {
      height: 500px;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h2>Lost & Found Item Locations with Hotspot Analysis</h2>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Heatmap Plugin -->
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <!-- Mock Data -->
  <script src="data.js"></script>

  <script>
    // Initialize map
    var map = L.map("map").setView([12.9725, 77.5960], 14);

    // Load OpenStreetMap tiles
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(map);

    // ---------------- MARKERS ----------------
    items.forEach(item => {
      let color = item.status === "lost" ? "red" : "green";

      let marker = L.circleMarker(
        [item.latitude, item.longitude],
        {
          radius: 8,
          color: color,
          fillColor: color,
          fillOpacity: 0.8
        }
      ).addTo(map);

      marker.bindPopup(
        `<b>Type:</b> ${item.type}<br>
         <b>Status:</b> ${item.status}<br>
         <b>Location:</b> ${item.location}`
      );
    });

    // ---------------- HOTSPOT (HEATMAP) ----------------
    var heatPoints = [];

    items.forEach(item => {
      if (item.status === "lost") {
        heatPoints.push([
          item.latitude,
          item.longitude,
          1   // intensity
        ]);
      }
    });

    var heatmap = L.heatLayer(heatPoints, {
      radius: 25,
      blur: 15,
      maxZoom: 17
    }).addTo(map);

  </script>

</body>
</html>
